version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: ascension_postgres
    restart: always
    environment:
      POSTGRES_USER: ascension
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ascension_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
